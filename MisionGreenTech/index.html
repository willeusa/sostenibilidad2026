<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salvemos el Planeta - GreenTech</title>


    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />


    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />


    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;700;900&display=swap"
      rel="stylesheet"
    />


    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f4fdf4;
        margin: 0;
      }
      .hero-gigante {
        background-image: url("https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=3000&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        height: 100vh;
        color: white;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }
      .btn-eco-redundante {
        background-color: #28a745 !important;
        border-color: #1e7e34 !important;
        padding: 15px 40px;
        font-size: 1.5rem;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="hero-gigante">
      <h1 class="display-1 fw-bold">Salvemos el Planeta</h1>
      <p class="lead fs-3 mt-3">Únete a la revolución verde de GreenTech.</p>


      <button class="btn btn-primary btn-eco-redundante mt-4">
        <i class="fa-solid fa-leaf"></i> Quiero ayudar
      </button>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script>
      $(document).ready(function () {
        const anioActual = moment().format("YYYY");
        $("body").append(
          '<footer class="text-center p-3 bg-dark text-white" style="width: 100%;">GreenTech Solutions &copy; ' +
            anioActual +
            " - Haciendo un mundo mejor (pero calentando tu CPU)</footer>",
        );
      });
    </script>
  </body>
</html>
